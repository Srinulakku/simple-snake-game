<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Snake</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #444;
    }
    p { margin: 0.75rem 0 0; font-size: 0.9rem; color: #888; }
  </style>
</head>
<body>
  <canvas id="c" width="400" height="400" aria-label="Snake game"></canvas>
  <p>Arrows to move &middot; R to restart</p>
  <script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");

    const cell = 20;
    const cols = canvas.width / cell;
    const rows = canvas.height / cell;

    let snake;
    let dir;
    let nextDir;
    let food;
    let tick;
    let alive;

    function randCell() {
      return { x: Math.floor(Math.random() * cols), y: Math.floor(Math.random() * rows) };
    }

    function placeFood() {
      let f;
      do {
        f = randCell();
      } while (snake.some((s) => s.x === f.x && s.y === f.y));
      return f;
    }

    function reset() {
      snake = [
        { x: Math.floor(cols / 2), y: Math.floor(rows / 2) },
        { x: Math.floor(cols / 2) - 1, y: Math.floor(rows / 2) },
      ];
      dir = { x: 1, y: 0 };
      nextDir = { ...dir };
      food = placeFood();
      alive = true;
    }

    function step() {
      if (!alive) return;

      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) {
        alive = false;
        return;
      }
      if (snake.some((s) => s.x === head.x && s.y === head.y)) {
        alive = false;
        return;
      }

      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        food = placeFood();
      } else {
        snake.pop();
      }
    }

    function draw() {
      ctx.fillStyle = "#0d0d0d";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#2d8a3e";
      for (const seg of snake) {
        ctx.fillRect(seg.x * cell, seg.y * cell, cell, cell);
      }
      ctx.fillStyle = "#c23d3d";
      ctx.fillRect(food.x * cell, food.y * cell, cell, cell);

      if (!alive) {
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        ctx.font = "24px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("Game over — press R", canvas.width / 2, canvas.height / 2);
      }
    }

    function loop() {
      step();
      draw();
    }

    document.addEventListener("keydown", (e) => {
      const k = e.key;
      if (k === "r" || k === "R") {
        clearInterval(tick);
        reset();
        tick = setInterval(loop, 120);
        draw();
        e.preventDefault();
        return;
      }
      if (!alive) return;

      if (k === "ArrowUp" && dir.y !== 1) {
        nextDir = { x: 0, y: -1 };
        e.preventDefault();
      } else if (k === "ArrowDown" && dir.y !== -1) {
        nextDir = { x: 0, y: 1 };
        e.preventDefault();
      } else if (k === "ArrowLeft" && dir.x !== 1) {
        nextDir = { x: -1, y: 0 };
        e.preventDefault();
      } else if (k === "ArrowRight" && dir.x !== -1) {
        nextDir = { x: 1, y: 0 };
        e.preventDefault();
      }
    });

    reset();
    draw();
    tick = setInterval(loop, 120);
  </script>
</body>
</html>
